<div class="login-container">
    <mat-card class="login-card">
      <mat-card-title>Login</mat-card-title>
      <mat-card-content>
        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
          <mat-form-field appearance="fill">
            <mat-label>Username</mat-label>
            <input matInput required [(ngModel)]="username" name="username" />
            <mat-error *ngIf="loginForm.submitted && !username">Username is required</mat-error>
          </mat-form-field>
  
          <mat-form-field appearance="fill">
            <mat-label>Password</mat-label>
            <input matInput type="password" required [(ngModel)]="password" name="password" />
          </mat-form-field>
  
          <button mat-raised-button color="primary" type="submit">Login</button>
        </form>
      </mat-card-content>
      <mat-card-content>
        <mat-label class="clickable-label" (click)="onLabelPage()">Pocetna</mat-label><br />
        <mat-label class="clickable-label" (click)="onLabelProgramms()">Programi</mat-label><br />
        <mat-label class="clickable-label" (click)="onLabelExcersise()">Vjezbe</mat-label>
      </mat-card-content>
    </mat-card>
    <mat-card-actions>
      <button mat-button class="register-button" (click)="navigateToRegistration()">Register</button>
  </mat-card-actions>
  </div>
