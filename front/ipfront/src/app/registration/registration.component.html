<div class="registration-container">
    <mat-card class="registration-card">
        <mat-card-title>Register</mat-card-title>
        <mat-card-content>
            <form (ngSubmit)="onSubmit()" #registrationForm="ngForm">
                <mat-form-field appearance="fill">
                    <mat-label>Name</mat-label>
                    <input matInput required [(ngModel)]="user.name" name="name" />
                </mat-form-field>
                
                <mat-form-field appearance="fill">
                    <mat-label>Surname</mat-label>
                    <input matInput required [(ngModel)]="user.surname" name="surname" />
                </mat-form-field>

                <mat-form-field appearance="fill">
                    <mat-label>City</mat-label>
                    <input matInput required [(ngModel)]="user.city" name="city" />
                </mat-form-field>

                <mat-form-field appearance="fill">
                    <mat-label>Email</mat-label>
                    <input matInput type="email" required [(ngModel)]="user.mail" name="mail" />
                </mat-form-field>

                <mat-form-field appearance="fill">
                    <mat-label>Username</mat-label>
                    <input matInput required [(ngModel)]="user.username" name="username" />
                </mat-form-field>

                <mat-form-field appearance="fill">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" required [(ngModel)]="user.password" name="password" />
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit">Register</button>
            </form>
        </mat-card-content>
    </mat-card>
</div>
