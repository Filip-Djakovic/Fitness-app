<div class="filter-container">
  <mat-form-field appearance="fill">
    <mat-label>Pretraži programe</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Pretraži">
  </mat-form-field>
</div>

<div class="rss-feed-container">
    <mat-card *ngFor="let item of items" class="rss-card" (click)="details(item)">
      <mat-card-header>
        <mat-card-title>{{ item.name }}</mat-card-title>
        <mat-card-subtitle>{{ item.price | currency }}</mat-card-subtitle>
      </mat-card-header>
      <img mat-card-image [src]="'data:image/jpeg;base64,' + item.picture" alt="{{ item.name }}">
      <mat-card-actions>
        <button mat-button color="warn" (click)="deleteItem(item, $event)">Delete</button>
      </mat-card-actions>
    </mat-card>
  </div>

  <mat-paginator [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions" (page)="onPageChange($event)">
  </mat-paginator>
